<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Relighted — Animations</title>
<link rel="icon" href="/favicon.jpg">

<style>
:root{
--color-fondo:#0A0C0F;
--color-texto:#F0F4FA;
--color-primario:#9AA5B1;
--color-secundario:#2D3748;
--color-borde:#2A3439;
--color-texto-secundario:#A0AEC0;
--transition-smooth:all .6s cubic-bezier(.23,1,.32,1);
}

*{box-sizing:border-box}
body{
margin:0;
font-family:'Inter',system-ui;
background:radial-gradient(circle at 20% 10%,rgba(154,165,177,.08),transparent 40%),var(--color-fondo);
color:var(--color-texto);
overflow-x:hidden;
}

.page{max-width:1200px;margin:3rem auto;padding:0 1.5rem 4rem}

/* HEADER */
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:3rem}
.brand h1{
margin:0;
font-weight:300;
font-size:1.7rem;
letter-spacing:-.02em;
background:linear-gradient(135deg,var(--color-primario),#A0AEC0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:fadeDown .8s ease forwards;
}
.brand p{margin:.2rem 0 0;color:var(--color-texto-secundario);opacity:0;animation:fadeDown .8s .15s ease forwards}

.controls{display:flex;gap:.8rem}
.btn-ghost{
padding:.6rem 1.2rem;
border-radius:999px;
border:1px solid rgba(255,255,255,.06);
background:linear-gradient(135deg,rgba(154,165,177,.06),rgba(45,55,72,.03));
color:var(--color-texto);
text-decoration:none;
transition:var(--transition-smooth);
font-size:.9rem;
}
.btn-ghost:hover{
transform:translateY(-6px);
border-color:var(--color-primario);
box-shadow:0 25px 35px -20px rgba(154,165,177,.4);
}

/* TITLE */
.featured{text-align:center;margin-bottom:2rem}
.featured h2{
font-weight:300;
font-size:2.2rem;
margin:0;
background:linear-gradient(135deg,var(--color-primario),#A0AEC0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:fadeUp 1s ease forwards;
}
.featured p{color:var(--color-texto-secundario);margin-top:.5rem;opacity:0;animation:fadeUp 1s .2s ease forwards}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:1.8rem;
margin-top:2.5rem;
}

.card{
background:rgba(17,20,23,.6);
border:1px solid var(--color-borde);
border-radius:20px;
overflow:hidden;
backdrop-filter:blur(10px);
transition:var(--transition-smooth);
opacity:0;
transform:translateY(40px);
animation:cardReveal .8s ease forwards;
}
.card:nth-child(n){animation-delay:calc(.1s * var(--i));}
.card:hover{
transform:translateY(-10px) scale(1.02);
border-color:transparent;
box-shadow:0 30px 60px -25px rgba(154,165,177,.35);
}

.thumb{position:relative;padding-bottom:56.25%;overflow:hidden}
.thumb img{position:absolute;width:100%;height:100%;object-fit:cover;transition:1.2s ease}
.card:hover .thumb img{transform:scale(1.08)}

.card-body{padding:1.2rem}
.card-title{font-size:1.05rem;font-weight:500;margin-bottom:.4rem}
.card-desc{font-size:.9rem;color:var(--color-texto-secundario)}

.card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:1rem}
.tag{font-size:.75rem;color:var(--color-texto-secundario);border:1px solid rgba(255,255,255,.05);padding:.25rem .5rem;border-radius:8px}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardReveal{to{opacity:1;transform:translateY(0)}}

@media(max-width:640px){.topbar{flex-direction:column;gap:1rem;align-items:flex-start}}

</style>
</head>
<body>

<main class="page">

<div class="topbar">
<div class="brand">
<h1>Relighted</h1>
<p>Animation Archive</p>
</div>
<div class="controls">
<a class="btn-ghost" href="https://discord.gg/x33ykcPqSY" target="_blank">Discord →</a>
<a class="btn-ghost" href="/">Home →</a>
</div>
</div>

<section class="featured">
<h2>Animations</h2>
<p>My anims.</p>
</section>

<section id="grid" class="grid"></section>

</main>

<script>

/* =========================================================
   🔥 HOW TO ADD A NEW ANIMATION (SUPER ORGANIZED PRESET)

   1. COPY the block below
   2. Paste it inside the animations array
   3. Replace the values
   4. Save → Commit → Push
   5. DONE (Grid adapts automatically)

   ---------- COPY THIS PRESET ----------

   {
     id: 'YOUTUBE_VIDEO_ID',
     title: 'Animation Title Here',
     desc: 'Short cinematic description here',
     preview: '/assets/images/your-image.jpg'
   },

   ---------------------------------------

   id = YouTube ID only (example: kR0Cv6524mM)
   preview = OPTIONAL (if not set, auto YouTube thumbnail is used)
   ========================================================= */

const animations = [

{ id:'kR0Cv6524mM', title:'Nagi Goal vs U20', desc:'Instantly kill it..', preview:null },
{ id:'TB9BlAUvUa8', title:'Two Gun Volley', desc:'A new invention here and now...', preview:null },

   {
  id: 'Wy6vYeO0Xes',
  title: 'Dragon Drive',
  desc: 'Demon',
  preview: '/assets/images/imagen.jpg'
},

];

function getThumbnail(id){
return 'https://i.ytimg.com/vi/'+id+'/hqdefault.jpg';
}

function buildCard(item,index){
const card=document.createElement('article');
card.className='card';
card.style.setProperty('--i',index);

const thumb=document.createElement('div');
thumb.className='thumb';

const img=document.createElement('img');
img.src=item.preview?item.preview:getThumbnail(item.id);
img.alt=item.title;
thumb.appendChild(img);

const body=document.createElement('div');
body.className='card-body';

const title=document.createElement('div');
title.className='card-title';
title.textContent=item.title;

const desc=document.createElement('div');
desc.className='card-desc';
desc.textContent=item.desc;

const foot=document.createElement('div');
foot.className='card-foot';

const tag=document.createElement('div');
tag.className='tag';
tag.textContent='YouTube';

const open=document.createElement('a');
open.className='btn-ghost';
open.style.padding='.4rem .9rem';
open.href='https://youtu.be/'+item.id;
open.target='_blank';
open.textContent='Open →';

foot.appendChild(tag);
foot.appendChild(open);
body.appendChild(title);
body.appendChild(desc);
body.appendChild(foot);

card.appendChild(thumb);
card.appendChild(body);

return card;
}

const grid=document.getElementById('grid');
animations.forEach((item,i)=>{
grid.appendChild(buildCard(item,i));
});

if(animations.length===0){
grid.innerHTML='<p style="color:var(--color-texto-secundario)">No animations yet.</p>';
}

</script>

</body>
</html>
