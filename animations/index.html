<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Relighted — Animations</title>
<link rel="icon" href="/favicon.jpg">

<style>
:root{
--color-fondo:#0A0C0F;
--color-texto:#F0F4FA;
--color-primario:#9AA5B1;
--color-secundario:#2D3748;
--color-borde:#2A3439;
--color-texto-secundario:#A0AEC0;
--transition-smooth:all .6s cubic-bezier(.23,1,.32,1);
--card-width:280px; /* ancho base de cada card */
--card-height:180px; /* alto base para miniatura */
}

/* RESET BASE */
*{box-sizing:border-box}
body{
margin:0;
font-family:'Inter',system-ui;
color:var(--color-texto);
overflow-x:hidden;

/* ================================
   FONDO DETALLADO COMO INDEX
   - Gradiente radial + partículas sutiles
   - Combina con estética Relighted
   ================================ */
background:
radial-gradient(circle at 20% 10%,rgba(154,165,177,.08),transparent 40%),
radial-gradient(circle at 80% 80%,rgba(154,165,177,.05),transparent 50%),
var(--color-fondo);
}

/* PAGE WRAPPER */
.page{max-width:1400px;margin:3rem auto;padding:0 2rem 5rem}

/* HEADER */
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:3rem}
.brand h1{
margin:0;
font-weight:300;
font-size:2rem;
letter-spacing:-.02em;
background:linear-gradient(135deg,var(--color-primario),#A0AEC0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:fadeDown .8s ease forwards;
}
.brand p{margin:.2rem 0 0;color:var(--color-texto-secundario);opacity:0;animation:fadeDown .8s .15s ease forwards}

.controls{display:flex;gap:1rem}
.btn-ghost{
padding:.6rem 1.2rem;
border-radius:999px;
border:1px solid rgba(255,255,255,.06);
background:linear-gradient(135deg,rgba(154,165,177,.06),rgba(45,55,72,.03));
color:var(--color-texto);
text-decoration:none;
transition:var(--transition-smooth);
font-size:.95rem;
}
.btn-ghost:hover{
transform:translateY(-6px);
border-color:var(--color-primario);
box-shadow:0 25px 35px -20px rgba(154,165,177,.4);
}

/* TITLE */
.featured{text-align:center;margin-bottom:3rem}
.featured h2{
font-weight:300;
font-size:2.4rem;
margin:0;
background:linear-gradient(135deg,var(--color-primario),#A0AEC0);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
animation:fadeUp 1s ease forwards;
}
.featured p{color:var(--color-texto-secundario);margin-top:.5rem;opacity:0;animation:fadeUp 1s .2s ease forwards}

/* =====================================================
   GRID ORGANIZADO
   - Máximo 5 animaciones por fila
   - Tarjetas más grandes
   ===================================================== */
.grid{
display:grid;
grid-template-columns:repeat(5, 1fr);
gap:2rem;
margin-top:2.5rem;
justify-items:center;
}

@media(max-width:1200px){.grid{grid-template-columns:repeat(3,1fr);}}
@media(max-width:900px){.grid{grid-template-columns:repeat(2,1fr);}}
@media(max-width:500px){.grid{grid-template-columns:1fr;}}

/* CARD */
.card{
background:rgba(17,20,23,.7);
border:1px solid var(--color-borde);
border-radius:22px;
overflow:hidden;
backdrop-filter:blur(12px);
transition:var(--transition-smooth);
opacity:0;
transform:translateY(40px);
animation:cardReveal .8s ease forwards;
width:var(--card-width);
}
.card:nth-child(n){animation-delay:calc(.1s * var(--i));}
.card:hover{
transform:translateY(-12px) scale(1.03);
border-color:transparent;
box-shadow:0 35px 60px -20px rgba(154,165,177,.35);
}

/* THUMB */
.thumb{position:relative;padding-bottom:56.25%;overflow:hidden;max-height:var(--card-height)}
.thumb img{position:absolute;width:100%;height:100%;object-fit:cover;transition:1.2s ease}
.card:hover .thumb img{transform:scale(1.09)}

/* BODY */
.card-body{padding:1.3rem}
.card-title{font-size:1.1rem;font-weight:500;margin-bottom:.4rem}
.card-desc{font-size:.92rem;color:var(--color-texto-secundario)}

.card-foot{display:flex;justify-content:space-between;align-items:center;margin-top:1rem}
.tag{font-size:.78rem;color:var(--color-texto-secundario);border:1px solid rgba(255,255,255,.05);padding:.3rem .6rem;border-radius:10px}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}
@keyframes cardReveal{to{opacity:1;transform:translateY(0)}}

/* RESPONSIVE */
@media(max-width:640px){.topbar{flex-direction:column;gap:1rem;align-items:flex-start}}
</style>
</head>
<body>
<!-- Asegurar que la página siempre inicie arriba del todo -->
<script>
  window.history.scrollRestoration = 'manual';
  window.scrollTo(0, 0);
</script>

<main class="page">

<div class="topbar">
<div class="brand">
<h1>Relighted</h1>
<p>Animation Archive</p>
</div>
<div class="controls">
<a class="btn-ghost" href="https://discord.com/users/741361076788133918" target="_blank">Discord →</a>
<a class="btn-ghost" href="/">Home →</a>
<a class="btn-ghost" href="/information">Info →</a> <!-- Nuevo botón Info -->
</div>
</div>

<section class="featured">
<h2>Animations</h2>
<p>My anims.</p>
</section>

<section id="grid" class="grid"></section>

</main>

<script>

/* =========================================================
   🔥 PRESET PARA AGREGAR NUEVAS ANIMACIONES
   - Copia dentro del array "animations"
   - Rellena id, title, desc, preview opcional
========================================================= */

const animations = [
{ id:'Sm2Wrro0zzs', title:'Street-Soccer Style Dribbling', desc:'Im running out of time..', preview:null },
{ id:'kR0Cv6524mM', title:'Nagi Goal vs U20', desc:'Instantly kill it..', preview:null },
{ id:'TB9BlAUvUa8', title:'Two Gun Volley', desc:'A new invention here and now...', preview:null },
{ id:'RvRuCoQz7vI', title:'Idle Cycle', desc:'a idle cycle', preview:null },
{ id:'2NoEf7uzPFE', title:'Former Striker', desc:'Selfish Captain?!..', preview:null },
{ id:'R7sa1oDmusg', title:'Run Cycle', desc:'A infinte run cycle', preview:null },
{ id:'Wy6vYeO0Xes', title:'Dragon Drive', desc:'Demon', preview:'/assets/images/imagen.jpg' },
{ id:'nlozlhtO_-E', title:'Walk Anim', desc:'Simple Rig Anim', preview:null },
{ id:'3zpqruFkSgU', title:'Half-Baked', desc:'Huh?! Itoshi Sae?..', preview:null },
];

function getThumbnail(id){ return 'https://i.ytimg.com/vi/'+id+'/hqdefault.jpg'; }

function buildCard(item,index){
const card=document.createElement('article');
card.className='card';
card.style.setProperty('--i',index);

const thumb=document.createElement('div');
thumb.className='thumb';

const img=document.createElement('img');
if(item.preview){
    img.src=item.preview;
    img.onerror = function(){ img.src = getThumbnail(item.id); };
}else{
    img.src = getThumbnail(item.id);
}
img.alt=item.title;
thumb.appendChild(img);

const body=document.createElement('div');
body.className='card-body';

const title=document.createElement('div');
title.className='card-title';
title.textContent=item.title;

const desc=document.createElement('div');
desc.className='card-desc';
desc.textContent=item.desc;

const foot=document.createElement('div');
foot.className='card-foot';

const tag=document.createElement('div');
tag.className='tag';
tag.textContent='YouTube';

const open=document.createElement('a');
open.className='btn-ghost';
open.style.padding='.45rem .95rem';
open.href='https://youtu.be/'+item.id;
open.target='_blank';
open.textContent='Open →';

foot.appendChild(tag);
foot.appendChild(open);
body.appendChild(title);
body.appendChild(desc);
body.appendChild(foot);

card.appendChild(thumb);
card.appendChild(body);

return card;
}

const grid=document.getElementById('grid');
animations.forEach((item,i)=>{ grid.appendChild(buildCard(item,i)); });

if(animations.length===0){
grid.innerHTML='<p style="color:var(--color-texto-secundario)">No animations yet.</p>';
}

</script>

<!-- Efecto de resplandor que sigue al cursor (igual que en el index principal) -->
<script>
  const glow = document.createElement("div");
  glow.style.position = "fixed";
  glow.style.width = "300px";
  glow.style.height = "300px";
  glow.style.pointerEvents = "none";
  glow.style.borderRadius = "50%";
  glow.style.background = "radial-gradient(circle, rgba(154,165,177,.15), transparent 70%)";
  glow.style.transform = "translate(-50%,-50%)";
  glow.style.zIndex = "-1";
  document.body.appendChild(glow);

  document.addEventListener("mousemove", e => {
    glow.style.left = e.clientX + "px";
    glow.style.top = e.clientY + "px";
  });
</script>

</body>
</html>
