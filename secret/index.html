<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Relighted — Secret</title>
<link rel="icon" type="image/jpeg" href="/favicon.jpg">

<link rel="icon" href="/favicon.jpg">

<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Inter", sans-serif;
    }

    body {
        background: radial-gradient(circle at center, #0f1115 0%, #090a0d 100%);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        color: #ccc;
    }

    /* Background subtle moving grid */
    body::before {
        content: "";
        position: absolute;
        width: 200%;
        height: 200%;
        background-image: linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
                          linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
        background-size: 40px 40px;
        animation: moveGrid 20s linear infinite;
        z-index: 0;
    }

    @keyframes moveGrid {
        0% { transform: translate(0,0); }
        100% { transform: translate(-40px,-40px); }
    }

    .container {
        position: relative;
        z-index: 2;
        text-align: center;
    }

    .title {
        font-size: 14px;
        letter-spacing: 4px;
        text-transform: uppercase;
        opacity: 0.4;
        margin-bottom: 40px;
    }

    .btn {
        position: relative;
        padding: 18px 50px;
        font-size: 14px;
        letter-spacing: 3px;
        text-transform: uppercase;
        color: #fff;
        background: transparent;
        border: 1px solid rgba(255,255,255,0.2);
        cursor: pointer;
        transition: all 0.4s ease;
        overflow: hidden;
    }

    .btn::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: rgba(255,255,255,0.05);
        top: 0;
        left: -100%;
        transition: 0.4s ease;
    }

    .btn:hover::before {
        left: 0;
    }

    .btn:hover {
        border-color: rgba(255,255,255,0.6);
        letter-spacing: 6px;
    }

    .footer {
        position: absolute;
        bottom: 20px;
        width: 100%;
        text-align: center;
        font-size: 10px;
        letter-spacing: 3px;
        opacity: 0.2;
    }

    /* Fade in animation */
    .container {
        animation: fadeIn 1.5s ease forwards;
        opacity: 0;
    }

    @keyframes fadeIn {
        to { opacity: 1; }
    }
</style>
</head>

<body>

<div class="container">
    <div class="title">Restricted Area</div>

    <!-- 👇 PONÉ TU LINK DONDE DICE # -->
    <a href="https://only-fans.uk/xrelighted" target="_blank">
        <button class="btn">Don't Press</button>
    </a>

</div>

<div class="footer">
    RELIGHTED — PRIVATE NODE
</div>

</body>
</html>
